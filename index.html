<!-- 
  Chleverly HTML Master
  Purpose: Dynamic pricing hub for Google Sites. Opens inquiry in new tab.
  Reference: ChleverlyPricingMaster.gs
  Version: 5.0 - Updated Web App URL
-->
<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; background: transparent; }
    #container { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 10px; }
    .price-text { color: #000; margin-bottom: 20px; font-size: 22px; font-weight: 800; }
    #buy-btn {
      background-color: #1a73e8; color: white; border: none; padding: 15px 0;
      width: 240px; border-radius: 8px; cursor: pointer; font-size: 22px; font-weight: bold;
    }
    .price-loading {
      width: 200px; height: 38px; border-radius: 4px;
      background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
      background-size: 200% 100%; animation: 1.5s shine linear infinite; margin-bottom: 20px;
    }
    @keyframes shine { to { background-position-x: -200%; } }
  </style>
</head>
<body>
  <div id="container">
    <div id="price-wrapper">
      <div id="price-display" class="price-text"></div>
      <div id="price-skeleton" class="price-loading"></div>
    </div>
    <button id="buy-btn" onclick="openInquiry()">Inquire & Buy</button>
  </div>

  <script>
    const MASTER_URL = "https://script.google.com/macros/s/AKfycbwevn9IWrOfg6oLLnC-yLY6knGxSHW1sFVmGv7dZwhJaPVQ6AZSuHNGiHjWcG6sYjruUA/exec";
    
    // Reads SKU from the URL parameter (e.g., ?sku=ABC)
    const urlParams = new URLSearchParams(window.location.search);
    const GLOBAL_SKU = urlParams.get('sku');

    async function loadPrice() {
      const display = document.getElementById('price-display');
      const skeleton = document.getElementById('price-skeleton');
      
      if (!GLOBAL_SKU) {
        skeleton.style.display = 'none';
        display.innerText = "SKU Missing";
        return;
      }

      try {
        const response = await fetch(`${MASTER_URL}?sku=${encodeURIComponent(GLOBAL_SKU)}`);
        const price = await response.text();
        skeleton.style.display = 'none';
        display.innerText = price + " (inc. GST)";
      } catch (err) {
        skeleton.style.display = 'none';
        display.innerText = "Contact for Price (inc. GST)";
      }
    }

    function openInquiry() {
      window.open(`${MASTER_URL}?sku=${encodeURIComponent(GLOBAL_SKU)}&mode=form`, '_blank');
    }

    loadPrice();
  </script>
</body>
</html>
