  Purpose: Dynamic pricing and inquiry widget hub for Google Sites.
  Reference: ChleverlyPricingMaster.gs
-->
<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://script.google.com">
  <style>
    body { margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; }
    #container { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 10px; }
    
    /* Price Styling */
    .price-text {
      color: #000;
      margin-bottom: 20px;
      font-size: 22px; 
      font-weight: 800;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Button Styling */
    #buy-btn {
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 15px 0;
      width: 240px; 
      border-radius: 8px;
      cursor: pointer;
      font-size: 22px;
      font-weight: bold;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* Skeleton Loader */
    .price-loading {
      width: 200px; height: 38px;
      background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
      border-radius: 4px; background-size: 200% 100%;
      animation: 1.5s shine linear infinite; margin-bottom: 20px;
    }
    @keyframes shine { to { background-position-x: -200%; } }

    #form-box { display: none; flex-direction: column; gap: 12px; width: 280px; margin-top: 15px; }
    #form-box input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
    #submit-btn { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div id="container">
  <div id="price-wrapper">
    <div id="price-display" class="price-text"></div>
    <div id="price-skeleton" class="price-loading"></div>
  </div>
  <button id="buy-btn" onclick="openForm()">Inquire & Buy</button>
  <div id="form-box">
    <input type="text" id="hp-field" style="display:none !important" tabindex="-1">
    <input type="text" id="u-name" placeholder="Full Name" required>
    <input type="email" id="u-email" placeholder="Email Address" required>
    <input type="tel" id="u-phone" placeholder="Mobile Number" required>
    <button id="submit-btn" onclick="submitData()">Send Inquiry</button>
  </div>
</div>

<script>
  const MASTER_URL = "https://script.google.com/macros/s/AKfycbw8LxK8aArs0N6FC75EUsCK8xQU7uvCC_JLlGB4NUYOU8835hkz73PuzwhgPaff8Sbs5g/exec";

  // DYNAMIC SKU PICKUP: Reads ?sku=XXXX from the URL
  const urlParams = new URLSearchParams(window.location.search);
  const GLOBAL_SKU = urlParams.get('sku');

  async function fetchWithRetry(url, retries = 2) {
    for (let i = 0; i < retries; i++) {
      try {
        const response = await fetch(url);
        if (response.ok) return await response.text();
      } catch (err) { if (i === retries - 1) throw err; }
    }
  }

  async function loadPrice() {
    if (!GLOBAL_SKU) {
      document.getElementById('price-skeleton').style.display = 'none';
      document.getElementById('price-display').innerText = "SKU Missing";
      return;
    }
    const display = document.getElementById('price-display');
    const skeleton = document.getElementById('price-skeleton');
    try {
      const price = await fetchWithRetry(`${MASTER_URL}?sku=${encodeURIComponent(GLOBAL_SKU)}`);
      skeleton.style.display = 'none';
      display.innerText = price + " (inc. GST)";
    } catch (err) {
      skeleton.style.display = 'none';
      display.innerText = "Contact for Price (inc. GST)";
    }
  }

  function openForm() {
    document.getElementById('buy-btn').style.display = 'none';
    document.getElementById('form-box').style.display = 'flex';
  }

  function submitData() {
    const btn = document.getElementById('submit-btn');
    const payload = {
      sku: GLOBAL_SKU,
      name: document.getElementById('u-name').value,
      email: document.getElementById('u-email').value,
      phone: document.getElementById('u-phone').value,
      honeypot: document.getElementById('hp-field').value
    };
    if(!payload.name || !payload.email || !payload.phone) return alert("Please fill all fields");
    btn.innerText = "Processing...";
    btn.disabled = true;
    fetch(MASTER_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
      .then(() => { document.getElementById('form-box').innerHTML = "<p style='color:#28a745; font-weight:bold;'>Inquiry sent!</p>"; });
  }

  loadPrice();
</script>
</body>
</html>
