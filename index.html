<!-- 
  Chleverly HTML Master
  Purpose: Dynamic pricing hub for Google Sites. Opens inquiry in new tab.
  Reference: ChleverlyPricingMaster.gs
  Version: 3.0 - New Tab Redirection
-->
<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; background: transparent; }
    #container { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 10px; }
    .price-text { color: #000; margin-bottom: 20px; font-size: 22px; font-weight: 800; min-height: 26px; }
    #buy-btn { background-color: #1a73e8; color: white; border: none; padding: 15px 0; width: 240px; border-radius: 8px; cursor: pointer; font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="container">
    <div id="price-display" class="price-text">Loading...</div>
    <button id="buy-btn" onclick="redirectToForm()">Inquire & Buy</button>
  </div>

  <script>
    // Ensure this URL is the "CLEAN" version without /u/7/
    const MASTER_URL = "https://script.google.com/macros/s/AKfycbw8LxK8aArs0N6FC75EUsCK8xQU7uvCC_JLlGB4NUYOU8835hkz73PuzwhgPaff8Sbs5g/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const GLOBAL_SKU = urlParams.get('sku');

    async function loadPrice() {
      if (!GLOBAL_SKU) {
        document.getElementById('price-display').innerText = "SKU Missing";
        return;
      }
      try {
        const response = await fetch(`${MASTER_URL}?sku=${encodeURIComponent(GLOBAL_SKU)}`);
        const price = await response.text();
        document.getElementById('price-display').innerText = price + " (inc. GST)";
      } catch (err) {
        document.getElementById('price-display').innerText = "Contact for Price (inc. GST)";
      }
    }

    function redirectToForm() {
      const fullInquiryUrl = `${MASTER_URL}?sku=${encodeURIComponent(GLOBAL_SKU)}&mode=form`;
      window.open(fullInquiryUrl, '_blank');
    }

    loadPrice();
  </script>
</body>
</html>
