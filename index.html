<!-- 
  Chleverly HTML Master
  Purpose: Dynamic pricing hub for Google Sites. Opens inquiry in new tab.
  Reference: ChleverlyPricingMaster.gs
  Version: 1.0 (01-May-2026) - Inquiry Form on New Window Redirection
-->
<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; text-align: center; font-family: sans-serif; }
    .price { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    .btn { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 18px; }
  </style>
</head>
<body>
  <div id="price" class="price">Loading...</div>
  <button class="btn" onclick="openForm()">Inquire & Buy</button>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwevn9IWrOfg6oLLnC-yLY6knGxSHW1sFVmGv7dZwhJaPVQ6AZSuHNGiHjWcG6sYjruUA/exec";
    const sku = new URLSearchParams(window.location.search).get('sku');

    fetch(`${SCRIPT_URL}?sku=${sku}`)
      .then(r => r.text())
      .then(t => document.getElementById('price').innerText = t);

    function openForm() {
      window.open(`${SCRIPT_URL}?sku=${sku}&mode=form`, '_blank');
    }
  </script>
</body>
</html>
